<!DOCTYPE html>
<html>
<head>
    <title>ACE Blind Debug</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit/lib/xterm-addon-fit.js"></script>
</head>

<body style="margin:0; background:black; color:#00ff00; font-family:monospace;">

<div style="display:flex; height:100vh;">

    <!-- TERMINAL -->
    <div id="terminal" style="flex:3; height:100%;"></div>

    <!-- SIDE PANEL -->
    <div style="flex:1; border-left:1px solid #00ff00; padding:10px;">
        <h3>ACE SYSTEM</h3>

        <div id="status">No problem selected</div>

        <hr style="border-color:#00ff00;">

        <div id="timer">Time Left: --:--</div>

        <hr style="border-color:#00ff00;">

        <div>
            Commands:
            <br>use &lt;1-5&gt;
            <br>help
            <br>clear
        </div>
    </div>

</div>

<!-- SCANLINE EFFECT -->
<div style="
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    background: repeating-linear-gradient(
        0deg,
        rgba(0,255,0,0.05),
        rgba(0,255,0,0.05) 1px,
        transparent 1px,
        transparent 3px
    );
    z-index:999;
"></div>

<script>

let contestOver = false;

const term = new Terminal({
    cursorBlink: true,
    scrollback: 2000,
    theme: {
        background: "#000000",
        foreground: "#00ff00",
        cursor: "#ffffff"
    }
});

term.open(document.getElementById("terminal"));

term.attachCustomKeyEventHandler((e) => {
    if (e.key === "ArrowUp" || e.key === "ArrowDown") {
        return false;
    }
    return true;
});

term.element.addEventListener("wheel", (e) => {
    e.preventDefault();
}, { passive: false });

term.element.style.userSelect = "none";

let user = prompt("Enter team name:");
let buffer = "";
let isTyping = false;

// =======================
// FIT ADDON
// =======================
const fitAddon = new FitAddon.FitAddon();
term.loadAddon(fitAddon);
fitAddon.fit();

window.addEventListener("resize", () => {
    fitAddon.fit();
});

// =======================
// TYPEWRITER
// =======================
async function typeLine(text, speed = 30) {
    isTyping = true;

    for (let i = 0; i < text.length; i++) {
        term.write(text[i]);
        await new Promise(r => setTimeout(r, speed));
    }

    term.write("\r\n");
    isTyping = false;
}

// =======================
// GLITCH
// =======================
async function glitchEffect() {
    const chars = "!@#$%^&*()_+=-{}[]";

    for (let i = 0; i < 5; i++) {
        let line = "";

        for (let j = 0; j < 20; j++) {
            line += chars[Math.floor(Math.random() * chars.length)];
        }

        term.writeln("\x1b[1;31m" + line + "\x1b[0m");

        await new Promise(r => setTimeout(r, 50));
    }
}

// =======================
// BOOT
// =======================
async function bootSequence() {

    await typeLine("Initializing ACE System...");
    await typeLine("Loading modules...");
    await typeLine("Connecting to secure server...");

    term.write("\x1b[1;31m");
    await typeLine("ERROR: Connection timeout", 10);
    term.write("\x1b[0m");

    await typeLine("Retrying...");
    await new Promise(r => setTimeout(r, 400));

    await typeLine("Re-establishing connection...");
    await typeLine("Connection established.");

    await typeLine("Decrypting challenge layers...");

    term.write("\x1b[1;31m");
    await typeLine("WARNING: Partial corruption detected", 10);
    term.write("\x1b[0m");

    await new Promise(r => setTimeout(r, 400));

    await typeLine("Applying recovery patch...");
    await typeLine("System stabilized.");

    term.write("\x1b[1;32m");
    await typeLine("Access granted.");
    await typeLine("Note: System behavior may be unpredictable...", 10);
    term.write("\x1b[0m");

    await typeLine("");
    await typeLine("ACE Blind Debugging");
    await typeLine("Type 'use 1' to start");
    await typeLine("Type 'help' anytime");

    term.write("> ");
}

// =======================
// INPUT HANDLER
// =======================
term.onKey(async (e) => {
    
    if (contestOver) return;
    if (isTyping) return;

    const key = e.key;

    if (e.domEvent.key === "Enter") {

        term.write("\r\n");

        if (buffer.startsWith("use")) {
            await glitchEffect();
        }

        let res = await fetch("/command", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                user: user,
                cmd: buffer
            })
        });

        let data = await res.json();

        let data = await res.json();

if (buffer.startsWith("use")) {
    let parts = buffer.split(" ");
    let num = parts[1];

    document.getElementById("status").innerText = "Problem " + num;
}

        if (data.output === "__CLEAR__") {
            term.clear();
            term.write("> ");
            buffer = "";
            return;
        }

        if (data.output.toLowerCase().includes("error") || data.output.toLowerCase().includes("invalid")) {

            term.write("\x1b[1;31m");
            term.write("\x1b[1;36m");

            await typeLine(data.output, 5);

            term.write("\x1b[0m");

        } else {

            term.write("\x1b[1;36m");
            term.write("\x1b[1;36m");

            await typeLine(data.output, 5);

            term.write("\x1b[0m");
        }

        document.body.style.boxShadow = "0 0 25px #00ff00";

        setTimeout(() => {
            document.body.style.boxShadow = "none";
        }, 100);

        term.write("> ");
        buffer = "";
    }

    else if (e.domEvent.key === "Backspace") {

        if (buffer.length > 0) {
            buffer = buffer.slice(0, -1);

            term.write("\r> " + buffer + " ");
            term.write("\b");
        }
    }

    else {

        buffer += key;
        term.write("\r> " + buffer);
    }
});

// =======================
// TIMER
// =======================
const duration = 60 * 60; // seconds
const endTime = Date.now() + duration * 1000;

setInterval(() => {

    let now = Date.now();
    let remaining = Math.floor((endTime - now) / 1000);

    if (remaining < 0) remaining = 0;

    let min = Math.floor(remaining / 60);
    let sec = remaining % 60;

    document.getElementById("timer").innerText =
        `Time Left: ${min}:${sec.toString().padStart(2, '0')}`;

    if (remaining <= 0 && !contestOver) {

        contestOver = true;

        term.write("\n");
        term.write("\x1b[1;31m");
        term.write("=== CONTEST ENDED ===\n");
        term.write("Submissions are closed.\n");
        term.write("\x1b[0m");
    }

}, 1000);

// =======================
// START
// =======================
bootSequence();

</script>

</body>
</html>
